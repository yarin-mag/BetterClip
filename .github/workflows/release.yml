name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Verify release versions agree
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE_VERSION=$(node -p "require('./npm/package.json').version")
          INSTALLER_VERSION=$(node -p "require('./npm/bin/install').VERSION")
          test "$VERSION" = "$PACKAGE_VERSION"
          test "$VERSION" = "$INSTALLER_VERSION"

      - name: Update Info.plist with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLIST_PATH="BetterClip/Resources/Info.plist"
          
          # Update CFBundleShortVersionString
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST_PATH"
          
          # Update CFBundleVersion (use full version without dots for build number)
          BUILD_NUMBER=$(echo "$VERSION" | tr -d '.')
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST_PATH"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test app
        run: xcodebuild test -project BetterClip.xcodeproj -scheme BetterClip -destination 'platform=macOS'

      - name: Build app
        run: |
          xcodebuild build \
            -project BetterClip.xcodeproj \
            -scheme BetterClip \
            -configuration Release \
            -derivedDataPath build

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/Build/Products/Release/BetterClip.app"
          DMG_NAME="BetterClip-${VERSION}.dmg"
          
          # Create a temporary directory for DMG contents
          mkdir -p DMGTemp
          cp -r "$APP_PATH" DMGTemp/
          ln -s /Applications DMGTemp/
          
          # Create DMG using hdiutil
          hdiutil create \
            -volname "BetterClip" \
            -srcfolder DMGTemp \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          
          # Verify DMG was created
          ls -lh "$DMG_NAME"

      - name: Generate and verify SHA-256 checksum
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="BetterClip-${VERSION}.dmg"
          shasum -a 256 "$DMG_NAME" > "${DMG_NAME}.sha256"
          shasum -a 256 -c "${DMG_NAME}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BetterClip-${{ steps.version.outputs.version }}.dmg
            BetterClip-${{ steps.version.outputs.version }}.dmg.sha256
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -rf DMGTemp
          rm -rf build
